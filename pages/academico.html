<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acadêmico | Cursos Online</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">

    <style>
        body { background-color: #f0f2f5; font-family: 'Inter', sans-serif; display: flex; }
        
        .sidebar {
            width: 250px;
            background-color: #1a1a1a;
            height: 100vh;
            position: fixed;
            left: 0; top: 0;
            padding: 20px 0;
            z-index: 1000;
        }
        .sidebar-brand { padding: 0 25px 20px; border-bottom: 1px solid #333; margin-bottom: 20px; }
        .nav-link-side {
            padding: 12px 25px;
            color: #adb5bd;
            text-decoration: none;
            display: flex; align-items: center;
            transition: 0.3s;
        }
        .nav-link-side:hover { color: white; background: rgba(255,255,255,0.05); }
        .nav-link-side.active { color: white; border-left: 4px solid #0d6efd; background: rgba(13, 110, 253, 0.1); }
        .nav-link-side i { margin-right: 15px; }

        .main-content { margin-left: 250px; width: 100%; padding: 40px; }
        .main-card { background: white; border-radius: 15px; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="sidebar shadow">
    <div class="sidebar-brand">
        <a class="text-white fw-bold text-decoration-none" href="../index.html">
            <i class="bi bi-rocket-takeoff-fill text-primary me-2"></i>Cursos Online
        </a>
    </div>
    <nav>
        <a href="../index.html" class="nav-link-side"><i class="bi bi-speedometer2"></i> Dashboard</a>
        <a href="usuario.html" class="nav-link-side"><i class="bi bi-person-gear"></i> Usuários</a>
        <a href="academico.html" class="nav-link-side active"><i class="bi bi-mortarboard"></i> Acadêmico</a>
        <a href="conteudo.html" class="nav-link-side"><i class="bi bi-layers"></i> Conteúdo</a>
        <a href="trilha.html" class="nav-link-side"><i class="bi bi-diagram-3"></i> Trilhas</a>
        <a href="financeiro.html" class="nav-link-side"><i class="bi bi-credit-card"></i> Financeiro</a>
        <a href="certificados.html" class="nav-link-side"><i class="bi bi-patch-check"></i> Certificados</a>
        <a href="quemsomos.html" class="nav-link-side"><i class="bi bi-info-circle"></i> Quem Somos</a>
    </nav>
</div>

<main class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold m-0">Gestão Acadêmica</h2>
            <p class="text-muted small">Gerencie cursos e categorias da plataforma.</p>
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-outline-primary shadow-sm" data-bs-toggle="modal" data-bs-target="#modalCat">Nova Categoria</button>
            <button class="btn btn-primary shadow-sm" data-bs-toggle="modal" data-bs-target="#modalCurso">Novo Curso</button>
        </div>
    </div>

    <div class="main-card p-3 mb-4">
        <label class="small fw-bold text-muted mb-1">LISTAR POR CATEGORIA</label>
        <select id="filtroCategoria" class="form-select border-0 bg-light"></select>
    </div>

    <div class="main-card overflow-hidden">
        <table class="table align-middle mb-0">
            <thead class="table-light">
                <tr>
                    <th class="ps-3 text-muted" style="font-size: 0.8rem;">ID</th>
                    <th class="text-muted" style="font-size: 0.8rem;">CURSO / NÍVEL</th>
                    <th class="text-muted" style="font-size: 0.8rem;">CATEGORIA (FK)</th>
                    <th class="text-center text-muted" style="font-size: 0.8rem;">AÇÕES</th>
                </tr>
            </thead>
            <tbody id="corpoCursos"></tbody>
        </table>
    </div>
</main>

<div class="modal fade" id="modalCat" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <form id="formCategoria">
                <div class="modal-header border-0"><h5>Nova Categoria</h5></div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="small fw-bold">NOME (UNIQUE)</label>
                        <input type="text" id="cat-nome" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="small fw-bold">DESCRIÇÃO</label>
                        <textarea id="cat-desc" class="form-control"></textarea>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="submit" class="btn btn-primary w-100">Salvar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div class="modal fade" id="modalCurso" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <form id="formCurso">
                <div class="modal-header border-0"><h5>Registrar Novo Curso</h5></div>
                <div class="modal-body row g-3">
                    <div class="col-12"><label class="small fw-bold">TÍTULO</label><input type="text" id="c-titulo" class="form-control" required></div>
                    <div class="col-12">
                        <label class="small fw-bold">CATEGORIA</label>
                        <select id="selectCategorias" class="form-select" required></select>
                    </div>
                    <div class="col-md-6"><label class="small fw-bold">ID INSTRUTOR</label><input type="number" id="c-instrutor" class="form-control" value="1"></div>
                    <div class="col-md-6">
                        <label class="small fw-bold">NÍVEL</label>
                        <select id="c-nivel" class="form-select">
                            <option>Iniciante</option>
                            <option>Intermediário</option>
                            <option>Avançado</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="submit" class="btn btn-primary w-100">Criar Curso</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="../modules/categoria/categoria.js"></script>
<script src="../modules/curso/curso.js"></script>
<script src="../modules/categoria/categoriaController.js"></script>
<script src="../modules/curso/cursoController.js"></script>

<script>
    // Inicializamos os controllers fora do onload para ficarem acessíveis
    const catCtrl = new CategoriaController();
    const cursoCtrl = new CursoController();

    window.onload = function() {
        sync();
    };

    function sync() {
        const categorias = catCtrl.listarTodas();
        const filtro = document.getElementById('filtroCategoria');
        const selectModal = document.getElementById('selectCategorias');

        const html = categorias.map(c => `<option value="${c.ID_Categoria}">${c.Nome}</option>`).join('');
        filtro.innerHTML = '<option value="todos">Todas as Categorias</option>' + html;
        selectModal.innerHTML = html || '<option disabled>Sem categorias cadastradas</option>';
        render();
    }

    function render() {
        const corpo = document.getElementById('corpoCursos');
        const filtroVal = document.getElementById('filtroCategoria').value;
        const dados = (filtroVal === "todos") ? cursoCtrl.listarTodos() : cursoCtrl.listarPorCategoria(filtroVal);

        if (dados.length === 0) {
            corpo.innerHTML = '<tr><td colspan="4" class="text-center py-4 text-muted">Nenhum curso encontrado.</td></tr>';
            return;
        }

        corpo.innerHTML = dados.map(c => `
            <tr>
                <td class="ps-3 text-muted">#${c.ID_Curso}</td>
                <td>
                    <span class="fw-bold text-dark">${c.Titulo}</span><br>
                    <span class="badge bg-primary-subtle text-primary" style="font-size: 0.7rem;">${c.Nivel}</span>
                </td>
                <td><span class="badge bg-light text-dark border">ID: ${c.ID_Categoria}</span></td>
                <td class="text-center">
                    <button class="btn btn-sm btn-outline-danger border-0" onclick="apagarCurso(${c.ID_Curso})">
                        <i class="bi bi-trash"></i>
                    </button>
                </td>
            </tr>
        `).join('');
    }

    // Função de apagar movida para o escopo global (fora do onload)
    function apagarCurso(id) {
        if(confirm("Deseja realmente remover este curso?")) { 
            const deletado = cursoCtrl.remover(id); 
            if(deletado) {
                render(); 
            } else {
                // Caso o controller não retorne nada, tentamos renderizar mesmo assim
                render();
            }
        }
    }

    document.getElementById('formCategoria').onsubmit = function(e) {
        e.preventDefault();
        catCtrl.cadastrar(document.getElementById('cat-nome').value, document.getElementById('cat-desc').value);
        bootstrap.Modal.getInstance(document.getElementById('modalCat')).hide();
        this.reset();
        sync();
    };

    document.getElementById('formCurso').onsubmit = function(e) {
        e.preventDefault();
        cursoCtrl.cadastrar(
            document.getElementById('c-titulo').value, "",
            document.getElementById('c-instrutor').value,
            document.getElementById('selectCategorias').value,
            document.getElementById('c-nivel').value, 1, 1
        );
        bootstrap.Modal.getInstance(document.getElementById('modalCurso')).hide();
        this.reset();
        render();
    };

    document.getElementById('filtroCategoria').onchange = () => render();
</script>
</body>
</html>
